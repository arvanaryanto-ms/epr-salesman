<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EPR Salesman · HOA</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@600;700;800&display=swap');

:root {
  --bg:       #06080f;
  --bg2:      #0d1220;
  --bg3:      #111827;
  --border:   #1a2540;
  --border2:  #243050;
  --blue:     #3b82f6;
  --blue2:    #1d4ed8;
  --cyan:     #22d3ee;
  --green:    #4ade80;
  --yellow:   #fbbf24;
  --red:      #f87171;
  --text:     #f1f5f9;
  --text2:    #94a3b8;
  --text3:    #475569;
  --mono:     'JetBrains Mono', monospace;
  --display:  'Syne', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  font-family: var(--mono);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  overflow-x: hidden;
}

/* ── SCREEN WRAPPER ── */
.app {
  width: 100%;
  max-width: 430px;
  min-height: 100vh;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}

/* ── VIEWS ── */
.view { display: none; flex-direction: column; min-height: 100vh; }
.view.on { display: flex; }

/* ══════════════════════════════
   LOGIN VIEW
══════════════════════════════ */
#vLogin {
  background: var(--bg);
  justify-content: center;
  align-items: center;
  padding: 32px 24px;
  position: relative;
}

.login-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 20%, rgba(59,130,246,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 80% 80%, rgba(34,211,238,0.06) 0%, transparent 60%);
  pointer-events: none;
}

.login-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(26,37,64,0.4) 1px, transparent 1px),
    linear-gradient(90deg, rgba(26,37,64,0.4) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
}

.login-box {
  width: 100%;
  max-width: 360px;
  position: relative;
  z-index: 1;
}

.brand {
  text-align: center;
  margin-bottom: 40px;
}

.brand-logo {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.brand-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--blue2), var(--blue));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--display);
  font-size: 22px; font-weight: 800;
  color: #fff;
  box-shadow: 0 0 20px rgba(59,130,246,0.3);
}

.brand-name {
  font-family: var(--display);
  font-size: 26px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.5px;
}

.brand-name span { color: var(--cyan); }

.brand-sub {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 4px;
}

.brand-divider {
  width: 48px; height: 2px;
  background: linear-gradient(90deg, var(--blue), var(--cyan));
  margin: 16px auto;
  border-radius: 2px;
}

.brand-desc {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 1px;
}

.login-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px;
}

.login-title {
  font-size: 13px;
  color: var(--cyan);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 20px;
  font-weight: 600;
}

.field { margin-bottom: 16px; }

.field-label {
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 6px;
  font-weight: 600;
}

.field-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}

.field-input:focus { border-color: var(--blue); }
.field-input::placeholder { color: var(--text3); }

.btn-login {
  width: 100%;
  background: var(--blue);
  border: none;
  border-radius: 8px;
  padding: 13px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.btn-login:hover { background: var(--blue2); }
.btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

.login-error {
  color: var(--red);
  font-size: 10px;
  text-align: center;
  margin-top: 10px;
  display: none;
}

.login-footer {
  text-align: center;
  margin-top: 24px;
  font-size: 9px;
  color: var(--text3);
  line-height: 1.8;
  letter-spacing: 1px;
}

.login-footer b { color: var(--blue); font-weight: 400; }

/* ══════════════════════════════
   DASHBOARD VIEW
══════════════════════════════ */
#vDash { background: var(--bg); }

.topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
}

.topbar-brand {
  display: flex; align-items: center; gap: 8px;
}

.topbar-icon {
  width: 28px; height: 28px;
  border-radius: 7px;
  background: linear-gradient(135deg, var(--blue2), var(--blue));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--display);
  font-size: 14px; font-weight: 800; color: #fff;
}

.topbar-title {
  font-family: var(--display);
  font-size: 15px; font-weight: 700;
  color: var(--text);
}

.topbar-title span { color: var(--cyan); }

.topbar-right {
  display: flex; align-items: center; gap: 8px;
}

.user-info { text-align: right; }
.user-name { font-size: 11px; color: var(--text); font-weight: 600; }
.user-branch { font-size: 9px; color: var(--yellow); letter-spacing: 1px; }

.btn-logout {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 5px 10px;
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  color: var(--text2);
  letter-spacing: 1px;
  cursor: pointer;
  text-transform: uppercase;
}

.btn-logout:hover { border-color: var(--red); color: var(--red); }

/* date bar */
.datebar {
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  padding: 6px 16px;
  display: flex; align-items: center; justify-content: space-between;
}

.datebar-badge {
  font-size: 9px; font-weight: 700;
  padding: 3px 8px; border-radius: 4px;
  letter-spacing: 1px;
}

.badge-today { background: rgba(59,130,246,0.15); color: var(--blue); border: 1px solid rgba(59,130,246,0.3); }
.datebar-date { font-size: 9px; color: var(--text3); }

/* summary bar */
.sumbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 8px 12px;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
}

.sum-item { text-align: center; }
.sum-val { font-size: 12px; font-weight: 600; }
.sum-lbl { font-size: 7px; color: var(--text3); margin-top: 1px; letter-spacing: 1px; }

/* list */
.list {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.list::-webkit-scrollbar { width: 2px; }
.list::-webkit-scrollbar-thumb { background: var(--border2); }

/* card */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  cursor: pointer;
  transition: border-color 0.15s;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}

.card.hadir::before { background: var(--green); }
.card.absen::before { background: var(--red); }
.card:hover { border-color: var(--border2); }

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 8px;
}

.card-id { font-size: 8px; color: var(--cyan); margin-bottom: 2px; letter-spacing: 1px; }
.card-name { font-size: 12px; font-weight: 600; color: var(--text); }
.card-team { font-size: 8px; color: var(--text3); margin-top: 1px; }

.badge {
  font-size: 8px; font-weight: 700;
  padding: 3px 7px; border-radius: 3px;
  letter-spacing: 1px; flex-shrink: 0;
}

.badge-hadir { background: rgba(74,222,128,0.1); color: #86efac; border: 1px solid rgba(74,222,128,0.25); }
.badge-absen { background: rgba(248,113,113,0.1); color: #fca5a5; border: 1px solid rgba(248,113,113,0.25); }

.card-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
  margin-bottom: 8px;
}

.stat-box {
  background: var(--bg3);
  border-radius: 5px;
  padding: 5px 4px;
  text-align: center;
  border: 1px solid var(--border);
}

.stat-val { font-size: 12px; font-weight: 600; }
.stat-lbl { font-size: 7px; color: var(--text3); margin-top: 1px; }

.card-omset {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 7px;
  border-top: 1px solid var(--border);
}

.omset-label { font-size: 9px; color: var(--text3); }
.omset-val { font-size: 13px; font-weight: 600; color: var(--text); }
.omset-val.zero { color: var(--text3); }
.card-detail-btn { font-size: 8px; color: var(--cyan); font-weight: 600; cursor: pointer; }

/* subtotal */
.subtotal {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 10px 12px;
  margin-top: 4px;
}

.subtotal-title {
  font-size: 9px; color: var(--yellow);
  letter-spacing: 2px; text-transform: uppercase;
  font-weight: 700; margin-bottom: 8px;
}

.subtotal-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
}

.subtotal-item { text-align: center; }
.subtotal-val { font-size: 12px; font-weight: 600; color: var(--yellow); }
.subtotal-lbl { font-size: 7px; color: var(--text3); margin-top: 1px; }

/* color helpers */
.c-green { color: var(--green); }
.c-yellow { color: var(--yellow); }
.c-red { color: var(--red); }
.c-blue { color: var(--cyan); }
.c-dim { color: var(--text3); }

/* ══════════════════════════════
   DETAIL VIEW
══════════════════════════════ */
#vDetail { background: var(--bg); }

.detail-back {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer;
  position: sticky; top: 0; z-index: 10;
}

.back-arrow { font-size: 18px; color: var(--cyan); font-weight: 700; }
.back-label { font-size: 9px; color: var(--text3); }
.back-name { font-size: 13px; font-weight: 600; color: var(--text); }
.back-id { font-size: 9px; color: var(--cyan); }

.detail-body { padding: 12px; overflow-y: auto; flex: 1; }

.detail-section { margin-bottom: 14px; }

.detail-section-title {
  font-size: 8px; color: var(--cyan);
  letter-spacing: 2px; text-transform: uppercase;
  font-weight: 700; margin-bottom: 8px;
  padding-bottom: 5px;
  border-bottom: 1px solid var(--border);
}

.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid rgba(26,37,64,0.5);
}

.detail-key { font-size: 11px; color: var(--text2); }
.detail-val { font-size: 11px; font-weight: 600; color: var(--text); }

/* ══════════════════════════════
   LOADING OVERLAY
══════════════════════════════ */
.overlay {
  position: fixed; inset: 0;
  background: rgba(6,8,15,0.85);
  display: none; align-items: center; justify-content: center;
  z-index: 100; flex-direction: column; gap: 12px;
}

.overlay.on { display: flex; }

.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border2);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }
.overlay-text { font-size: 10px; color: var(--text3); letter-spacing: 2px; }
</style>
</head>
<body>
<div class="app">

  <!-- ── LOADING OVERLAY ── -->
  <div class="overlay" id="overlay">
    <div class="spinner"></div>
    <div class="overlay-text">MEMUAT DATA...</div>
  </div>

  <!-- ══════════════════════════
       LOGIN VIEW
  ══════════════════════════ -->
  <div class="view on" id="vLogin">
    <div class="login-bg"></div>
    <div class="login-grid"></div>
    <div class="login-box">
      <div class="brand">
        <div class="brand-logo">
          <div class="brand-icon">C</div>
          <div class="brand-name">imory<span>.</span></div>
        </div>
        <div class="brand-sub">PT. Macrosentra Niagaboga</div>
        <div class="brand-divider"></div>
        <div class="brand-desc">EPR · EFFECTIVE PRODUCTIVITY</div>
      </div>

      <div class="login-card">
        <div class="login-title">// Masuk ke Sistem</div>

        <div class="field">
          <div class="field-label">ID Pengguna</div>
          <input class="field-input" id="inUser" type="text" placeholder="contoh: hoa-atb01" autocomplete="off" autocapitalize="none">
        </div>

        <div class="field">
          <div class="field-label">Password</div>
          <input class="field-input" id="inPass" type="password" placeholder="••••••••">
        </div>

        <button class="btn-login" id="btnLogin" onclick="doLogin()">MASUK</button>
        <div class="login-error" id="loginErr"></div>
      </div>

      <div class="login-footer">
        <b>EPR Salesman v1.0</b><br>
        IT Dept. Arvan · PT. Macrosentra Niagaboga · 2026
      </div>
    </div>
  </div>

  <!-- ══════════════════════════
       DASHBOARD VIEW
  ══════════════════════════ -->
  <div class="view" id="vDash">
    <div class="topbar">
      <div class="topbar-brand">
        <div class="topbar-icon">C</div>
        <div class="topbar-title">imory<span>.</span></div>
      </div>
      <div class="topbar-right">
        <div class="user-info">
          <div class="user-name" id="uName">—</div>
          <div class="user-branch" id="uBranch">—</div>
        </div>
        <button class="btn-logout" onclick="doLogout()">KELUAR</button>
      </div>
    </div>

    <div class="datebar">
      <span class="datebar-badge badge-today">TODAY</span>
      <span class="datebar-date" id="dDate">—</span>
    </div>

    <div class="sumbar" id="sumbar">
      <div class="sum-item"><div class="sum-val c-blue">—</div><div class="sum-lbl">HADIR</div></div>
      <div class="sum-item"><div class="sum-val c-green">—</div><div class="sum-lbl">CALL</div></div>
      <div class="sum-item"><div class="sum-val c-green">—</div><div class="sum-lbl">EC</div></div>
      <div class="sum-item"><div class="sum-val c-yellow">—</div><div class="sum-lbl">EC%</div></div>
      <div class="sum-item"><div class="sum-val c-green">—</div><div class="sum-lbl">OMSET</div></div>
    </div>

    <div class="list" id="listEl"></div>
  </div>

  <!-- ══════════════════════════
       DETAIL VIEW
  ══════════════════════════ -->
  <div class="view" id="vDetail">
    <div class="detail-back" onclick="showView('vDash')">
      <span class="back-arrow">‹</span>
      <div>
        <div class="back-label">Kembali ke daftar</div>
        <div class="back-id" id="dId">—</div>
        <div class="back-name" id="dName">—</div>
      </div>
    </div>
    <div class="detail-body" id="dBody"></div>
  </div>

</div>

<script>
// ── CONFIG ──
const API = 'http://172.20.240.7:1888';

// ── STATE ──
let token = localStorage.getItem('epr_token') || '';
let userData = JSON.parse(localStorage.getItem('epr_user') || 'null');
let salesData = [];

// ── HELPERS ──
const $ = id => document.getElementById(id);
const f = n => (!n || n == 0) ? '0' : Number(n).toLocaleString('id-ID');
const fp = p => (!p || p == 0) ? '0%' : parseFloat(p).toFixed(1) + '%';
const cv = v => v == 0 ? 'c-dim' : 'c-green';

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  $(id).classList.add('on');
}

function loading(show) {
  $('overlay').classList.toggle('on', show);
}

// ── LOGIN ──
async function doLogin() {
  const userid = $('inUser').value.trim().toLowerCase();
  const password = $('inPass').value.trim();
  const errEl = $('loginErr');
  const btn = $('btnLogin');

  errEl.style.display = 'none';

  if (!userid || !password) {
    errEl.textContent = 'ID dan password wajib diisi.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'MEMPROSES...';
  loading(true);

  try {
    const res = await fetch(`${API}/api/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userid, password })
    });

    const data = await res.json();

    if (!data.success) {
      errEl.textContent = data.message || 'ID atau password salah.';
      errEl.style.display = 'block';
      return;
    }

    token = data.token;
    userData = { userid: data.userid, slsno: data.slsno, kodecabang: data.kodecabang };
    localStorage.setItem('epr_token', token);
    localStorage.setItem('epr_user', JSON.stringify(userData));

    $('uName').textContent = data.userid.toUpperCase();
    $('uBranch').textContent = data.kodecabang;

    showView('vDash');
    await loadData();

  } catch (err) {
    errEl.textContent = 'Gagal terhubung ke server. Cek koneksi jaringan.';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'MASUK';
    loading(false);
  }
}

// ── LOGOUT ──
async function doLogout() {
  try {
    await fetch(`${API}/api/logout`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}` }
    });
  } catch (e) {}

  token = '';
  userData = null;
  salesData = [];
  localStorage.removeItem('epr_token');
  localStorage.removeItem('epr_user');
  $('inUser').value = '';
  $('inPass').value = '';
  showView('vLogin');
}

// ── LOAD DATA ──
async function loadData() {
  loading(true);
  try {
    const res = await fetch(`${API}/api/data`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });

    const json = await res.json();

    if (!json.success) {
      if (res.status === 401) { doLogout(); return; }
      return;
    }

    salesData = json.data || [];
    $('dDate').textContent = json.date || '';
    renderDash();

  } catch (err) {
    console.error('Load data error:', err);
  } finally {
    loading(false);
  }
}

// ── RENDER DASHBOARD ──
function renderDash() {
  const data = salesData;

  // Summary
  const hadir = data.filter(r => r.ACTUAL_CALL > 0).length;
  const totalCall = data.reduce((a, r) => a + (r.ACTUAL_CALL || 0), 0);
  const totalEc = data.reduce((a, r) => a + (r.EC || 0), 0);
  const totalRps = data.reduce((a, r) => a + (r.RPS || 0), 0);
  const ecPct = totalRps > 0 ? (totalEc / totalRps * 100).toFixed(1) : '0.0';

  // Parse omset total (format "1.077.600" → number)
  const parseOmset = s => {
    if (!s || s === '0') return 0;
    return parseInt(s.replace(/\./g, '')) || 0;
  };

  const totalOmset = data.reduce((a, r) => a + parseOmset(r.OMSET_TOTAL), 0);
  const omsetFmt = totalOmset === 0 ? '0' : (totalOmset / 1e6).toFixed(1) + 'jt';

  $('sumbar').innerHTML = `
    <div class="sum-item"><div class="sum-val c-blue">${hadir}/${data.length}</div><div class="sum-lbl">HADIR</div></div>
    <div class="sum-item"><div class="sum-val c-green">${f(totalCall)}</div><div class="sum-lbl">CALL</div></div>
    <div class="sum-item"><div class="sum-val c-green">${f(totalEc)}</div><div class="sum-lbl">EC</div></div>
    <div class="sum-item"><div class="sum-val c-yellow">${ecPct}%</div><div class="sum-lbl">EC%</div></div>
    <div class="sum-item"><div class="sum-val c-green">${omsetFmt}</div><div class="sum-lbl">OMSET</div></div>
  `;

  // Cards
  let html = '';
  data.forEach((r, i) => {
    const absen = !r.ACTUAL_CALL || r.ACTUAL_CALL == 0;
    const ecPctRow = r.RPS > 0 ? (r.EC / r.RPS * 100).toFixed(1) : '0.0';
    const ecColor = ecPctRow >= 70 ? 'c-green' : ecPctRow >= 50 ? 'c-yellow' : 'c-red';
    const omset = r.OMSET_TOTAL || '0';
    const omsetZero = omset === '0';

    html += `
    <div class="card ${absen ? 'absen' : 'hadir'}" onclick="showDetail(${i})">
      <div class="card-top">
        <div>
          <div class="card-id">${r.SLSCODE}</div>
          <div class="card-name">${r.SLSNAME}</div>
          <div class="card-team">${r.SALESMAN_TEAM} · ${r.BRANCH}</div>
        </div>
        <span class="badge ${absen ? 'badge-absen' : 'badge-hadir'}">${absen ? 'ABSEN' : 'HADIR'}</span>
      </div>
      <div class="card-stats">
        <div class="stat-box">
          <div class="stat-val ${cv(r.RPS)}">${f(r.RPS)}</div>
          <div class="stat-lbl">RPS</div>
        </div>
        <div class="stat-box">
          <div class="stat-val ${cv(r.ACTUAL_CALL)}">${f(r.ACTUAL_CALL)}</div>
          <div class="stat-lbl">CALL</div>
        </div>
        <div class="stat-box">
          <div class="stat-val ${cv(r.EC)}">${f(r.EC)}</div>
          <div class="stat-lbl">EC</div>
        </div>
        <div class="stat-box">
          <div class="stat-val ${ecColor}">${absen ? '0%' : ecPctRow + '%'}</div>
          <div class="stat-lbl">EC%</div>
        </div>
      </div>
      <div class="card-omset">
        <div>
          <div class="omset-label">Omset Total</div>
          <div class="omset-val ${omsetZero ? 'zero' : ''}">${omsetZero ? '—' : 'Rp ' + omset}</div>
        </div>
        <span class="card-detail-btn">detail ›</span>
      </div>
    </div>`;
  });

  // Subtotal
  const stCall = data.reduce((a, r) => a + (r.ACTUAL_CALL || 0), 0);
  const stEc = data.reduce((a, r) => a + (r.EC || 0), 0);
  const stRps = data.reduce((a, r) => a + (r.RPS || 0), 0);
  const stNoo = data.reduce((a, r) => a + (r.NOO || 0), 0);
  const stEcPct = stRps > 0 ? (stEc / stRps * 100).toFixed(1) : '0.0';
  const stOmset = data.reduce((a, r) => a + parseOmset(r.OMSET_TOTAL), 0);
  const stOmsetFmt = stOmset === 0 ? '0' : (stOmset / 1e6).toFixed(1) + 'jt';

  html += `
  <div class="subtotal">
    <div class="subtotal-title">▸ Sub Total ${userData ? userData.kodecabang : ''}</div>
    <div class="subtotal-grid">
      <div class="subtotal-item"><div class="subtotal-val">${f(stCall)}</div><div class="subtotal-lbl">CALL</div></div>
      <div class="subtotal-item"><div class="subtotal-val">${f(stEc)}</div><div class="subtotal-lbl">EC</div></div>
      <div class="subtotal-item"><div class="subtotal-val">${stEcPct}%</div><div class="subtotal-lbl">EC%</div></div>
      <div class="subtotal-item"><div class="subtotal-val">${stOmsetFmt}</div><div class="subtotal-lbl">OMSET</div></div>
    </div>
  </div>`;

  $('listEl').innerHTML = html;
}

// ── DETAIL ──
function showDetail(i) {
  const r = salesData[i];
  $('dId').textContent = r.SLSCODE;
  $('dName').textContent = r.SLSNAME;

  const ecPct = r.RPS > 0 ? (r.EC / r.RPS * 100).toFixed(1) : '0.0';
  const ecColor = ecPct >= 70 ? 'c-green' : ecPct >= 50 ? 'c-yellow' : 'c-red';

  $('dBody').innerHTML = `
    <div class="detail-section">
      <div class="detail-section-title">Identitas</div>
      <div class="detail-row"><span class="detail-key">Kode Salesman</span><span class="detail-val">${r.SLSCODE}</span></div>
      <div class="detail-row"><span class="detail-key">Nama</span><span class="detail-val">${r.SLSNAME}</span></div>
      <div class="detail-row"><span class="detail-key">Team</span><span class="detail-val">${r.SALESMAN_TEAM}</span></div>
      <div class="detail-row"><span class="detail-key">Cabang</span><span class="detail-val">${r.BRANCH}</span></div>
      <div class="detail-row"><span class="detail-key">Status</span><span class="detail-val ${r.ACTUAL_CALL > 0 ? 'c-green' : 'c-red'}">${r.ACTUAL_CALL > 0 ? 'HADIR' : 'ABSEN'}</span></div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Kunjungan</div>
      <div class="detail-row"><span class="detail-key">RPS (Rencana)</span><span class="detail-val ${cv(r.RPS)}">${f(r.RPS)}</span></div>
      <div class="detail-row"><span class="detail-key">Actual Call</span><span class="detail-val ${cv(r.ACTUAL_CALL)}">${f(r.ACTUAL_CALL)}</span></div>
      <div class="detail-row"><span class="detail-key">Call Rute</span><span class="detail-val ${cv(r.CALL_RUTE)}">${f(r.CALL_RUTE)}</span></div>
      <div class="detail-row"><span class="detail-key">Call Non Rute</span><span class="detail-val ${cv(r.CALL_NON_RUTE)}">${f(r.CALL_NON_RUTE)}</span></div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Efektivitas</div>
      <div class="detail-row"><span class="detail-key">EC</span><span class="detail-val ${cv(r.EC)}">${f(r.EC)}</span></div>
      <div class="detail-row"><span class="detail-key">EC%</span><span class="detail-val ${ecColor}">${ecPct}%</span></div>
      <div class="detail-row"><span class="detail-key">NOO</span><span class="detail-val ${cv(r.NOO)}">${f(r.NOO)}</span></div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Omset</div>
      <div class="detail-row"><span class="detail-key">Omset Total</span><span class="detail-val c-green">Rp ${r.OMSET_TOTAL || '0'}</span></div>
    </div>
  `;

  showView('vDetail');
}

// ── INIT ──
$('inPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
$('inUser').addEventListener('keydown', e => { if (e.key === 'Enter') $('inPass').focus(); });

// Auto-login jika token masih ada
if (token && userData) {
  $('uName').textContent = userData.userid.toUpperCase();
  $('uBranch').textContent = userData.kodecabang;
  showView('vDash');
  loadData();
}

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
