<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPR Salesman · HOA</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="config.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@600;700;800&display=swap');
:root {
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;
  --border:#30363d;--border2:#3d444d;
  --blue:#58a6ff;--blue2:#1f6feb;--cyan:#39d0f0;
  --green:#56d364;--yellow:#e3b341;--red:#ff7b72;
  --text:#ffffff;--text2:#c9d1d9;--text3:#8b949e;
  --mono:'JetBrains Mono',monospace;--display:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);font-family:var(--mono);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;overflow-x:hidden;}
.app{width:100%;max-width:430px;min-height:100vh;background:var(--bg);position:relative;overflow:hidden;}
.view{display:none;flex-direction:column;min-height:100vh;}.view.on{display:flex;}
#vLogin{background:var(--bg);justify-content:center;align-items:center;padding:32px 24px;position:relative;}
.login-bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 20%,rgba(59,130,246,0.08) 0%,transparent 60%),radial-gradient(ellipse 40% 60% at 80% 80%,rgba(34,211,238,0.06) 0%,transparent 60%);pointer-events:none;}
.login-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(26,37,64,0.4) 1px,transparent 1px),linear-gradient(90deg,rgba(26,37,64,0.4) 1px,transparent 1px);background-size:32px 32px;pointer-events:none;}
.login-box{width:100%;max-width:360px;position:relative;z-index:1;}
.brand{text-align:center;margin-bottom:40px;}
.brand-name{font-family:var(--display);font-size:36px;font-weight:800;letter-spacing:-1px;margin-bottom:8px;}
.brand-name .bc{color:var(--cyan);}.brand-name .bw{color:var(--text);}
.brand-sub{font-size:10px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-top:4px;}
.brand-divider{width:48px;height:2px;background:linear-gradient(90deg,var(--blue),var(--cyan));margin:16px auto;border-radius:2px;}
.brand-desc{font-size:11px;color:var(--text3);letter-spacing:1px;}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px 24px;}
.login-title{font-size:13px;color:var(--cyan);letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;font-weight:600;}
.field{margin-bottom:16px;}
.field-label{font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;font-weight:600;}
.field-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-family:var(--mono);font-size:13px;color:var(--text);outline:none;transition:border-color 0.2s;}
.field-input:focus{border-color:var(--blue);}.field-input::placeholder{color:var(--text3);}
.btn-login{width:100%;background:var(--blue);border:none;border-radius:8px;padding:13px;font-family:var(--mono);font-size:12px;font-weight:700;color:#fff;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:all 0.2s;}
.btn-login:hover{background:var(--blue2);}.btn-login:disabled{opacity:0.6;cursor:not-allowed;}
.login-error{color:var(--red);font-size:10px;text-align:center;margin-top:10px;display:none;}
.login-footer{text-align:center;margin-top:24px;font-size:9px;color:var(--text3);line-height:1.8;letter-spacing:1px;}
.login-footer b{color:var(--blue);font-weight:400;}
.toast{position:absolute;top:60px;left:50%;transform:translateX(-50%);background:rgba(74,222,128,0.15);border:1px solid rgba(74,222,128,0.35);color:#86efac;font-size:9px;padding:6px 14px;border-radius:20px;letter-spacing:1px;font-weight:700;white-space:nowrap;z-index:20;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.toast.show{opacity:1;}
#vDash{background:var(--bg);}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.topbar-brand{display:flex;align-items:center;}
.topbar-title{font-family:var(--display);font-size:22px;font-weight:800;}
.topbar-title .tc{color:var(--cyan);}.topbar-title .tw{color:var(--text);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.user-info{text-align:right;}
.user-name{font-size:11px;color:var(--text);font-weight:600;}
.user-branch{font-size:9px;color:var(--yellow);letter-spacing:1px;}
.btn-logout{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:5px 10px;font-family:var(--mono);font-size:9px;font-weight:700;color:var(--text2);letter-spacing:1px;cursor:pointer;text-transform:uppercase;}
.btn-logout:hover{border-color:var(--red);color:var(--red);}
.modebar{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.mode-toggle{display:flex;background:var(--bg3);border-radius:8px;padding:3px;gap:2px;}
.mode-btn{font-family:var(--mono);font-size:11px;font-weight:700;padding:6px 16px;border-radius:6px;border:none;cursor:pointer;letter-spacing:1px;transition:all 0.2s;color:var(--text3);background:transparent;}
.mode-btn.active-today{background:var(--blue);color:#fff;}.mode-btn.active-mtd{background:var(--yellow);color:#0d1528;}
.mode-date{font-size:9px;color:var(--text3);letter-spacing:1px;}
.mtd-filter{display:none;padding:6px 12px;background:var(--bg3);border-bottom:1px solid var(--border);align-items:center;gap:8px;}
.mtd-filter.on{display:flex;}
.mtd-label{font-size:9px;color:var(--text3);letter-spacing:1px;font-weight:600;}
.mtd-select{font-family:var(--mono);font-size:10px;background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:5px 8px;border-radius:5px;outline:none;}
.pull-hint{text-align:center;font-size:8px;color:var(--text3);letter-spacing:1px;padding:5px 0;display:none;}
.pull-hint.on{display:block;}
.sumbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;flex-direction:column;gap:4px;}
.sumbar-row{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;}
.sum-divider{height:1px;background:var(--border);}
.sum-item{text-align:center;}
.sum-val{font-size:12px;font-weight:700;}
.sum-lbl{font-size:7px;color:var(--text2);margin-top:1px;letter-spacing:1px;}
.list{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}
.list::-webkit-scrollbar{width:2px;}.list::-webkit-scrollbar-thumb{background:var(--border2);}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;transition:border-color 0.15s;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.card.hadir::before{background:var(--green);}.card.absen::before{background:var(--red);}.card.belum::before{background:var(--yellow);}
.card:hover{border-color:var(--border2);}
.card-rank{position:absolute;top:8px;right:10px;font-size:10px;font-weight:700;color:var(--text3);}
.card-rank.gold{color:#ffd700;}.card-rank.silver{color:#c0c0c0;}.card-rank.bronze{color:#cd7f32;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.card-id{font-size:9px;color:var(--cyan);margin-bottom:2px;letter-spacing:1px;font-weight:700;}
.card-name{font-size:14px;font-weight:700;color:#fff;}
.card-team{font-size:9px;color:var(--text2);margin-top:1px;}
.badge{font-size:8px;font-weight:700;padding:3px 7px;border-radius:3px;letter-spacing:1px;flex-shrink:0;}
.badge-hadir{background:rgba(74,222,128,0.1);color:#86efac;border:1px solid rgba(74,222,128,0.25);}
.badge-absen{background:rgba(248,113,113,0.1);color:#fca5a5;border:1px solid rgba(248,113,113,0.25);}
.badge-belum{background:rgba(251,191,36,0.1);color:#fde68a;border:1px solid rgba(251,191,36,0.25);}
.card-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:6px;}
.stat-box{background:var(--bg3);border-radius:5px;padding:5px 4px;text-align:center;border:1px solid var(--border);}
.stat-val{font-size:13px;font-weight:700;color:#fff;}.stat-lbl{font-size:8px;color:var(--text2);margin-top:1px;}
.progress-wrap{margin-bottom:6px;}
.progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
.progress-lbl{font-size:7px;color:var(--text3);letter-spacing:1px;}
.progress-pct{font-size:9px;font-weight:700;}
.progress-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:4px;}
.progress-fill{height:100%;border-radius:2px;}
.card-bottom{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:6px;}
.bottom-box{background:var(--bg3);border-radius:5px;padding:4px;text-align:center;border:1px solid var(--border);}
.bottom-val{font-size:12px;font-weight:700;color:#fff;}.bottom-lbl{font-size:8px;color:var(--text2);margin-top:1px;}
.card-omset{display:flex;justify-content:space-between;align-items:center;padding-top:7px;border-top:1px solid var(--border);}
.omset-label{font-size:9px;color:var(--text2);}
.omset-val{font-size:14px;font-weight:700;color:#fff;}.omset-val.zero{color:var(--text3);}
.card-detail-btn{font-size:8px;color:var(--cyan);font-weight:600;cursor:pointer;}
.subtotal{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;margin-top:4px;}
.subtotal-title{font-size:9px;color:var(--yellow);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:8px;}
.subtotal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
.subtotal-item{text-align:center;}
.subtotal-val{font-size:12px;font-weight:600;color:var(--yellow);}.subtotal-lbl{font-size:7px;color:var(--text3);margin-top:1px;}
.best-box{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;margin-top:4px;}
.best-title{font-size:9px;color:var(--yellow);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:8px;}
.best-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.best-item{background:var(--bg2);border-radius:8px;padding:8px 10px;border:1px solid var(--border);}
.best-cat{font-size:7px;color:var(--cyan);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;font-weight:700;}
.best-name{font-size:11px;font-weight:700;color:#fff;margin-bottom:2px;}
.best-val{font-size:14px;font-weight:700;color:var(--yellow);}
.best-sub{font-size:8px;color:var(--text3);margin-top:2px;}
.c-green{color:var(--green);}.c-yellow{color:var(--yellow);}.c-red{color:var(--red);}.c-blue{color:var(--cyan);}.c-dim{color:var(--text3);}
#vDetail{background:var(--bg);}
.detail-back{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;position:sticky;top:0;z-index:10;}
.back-arrow{font-size:18px;color:var(--cyan);font-weight:700;}.back-label{font-size:9px;color:var(--text3);}
.back-name{font-size:13px;font-weight:600;color:var(--text);}.back-id{font-size:9px;color:var(--cyan);}
.detail-body{padding:12px;overflow-y:auto;flex:1;}
.detail-section{margin-bottom:14px;}
.detail-section-title{font-size:8px;color:var(--cyan);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(26,37,64,0.5);}
.detail-key{font-size:11px;color:var(--text2);}.detail-val{font-size:11px;font-weight:600;color:var(--text);}
.detail-mode-badge{display:inline-block;font-size:8px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:1px;margin-left:6px;background:rgba(251,191,36,0.15);color:var(--yellow);border:1px solid rgba(251,191,36,0.3);vertical-align:middle;}
.overlay{position:fixed;inset:0;background:rgba(6,8,15,0.85);display:none;align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:12px;}
.overlay.on{display:flex;}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.overlay-text{font-size:10px;color:var(--text3);letter-spacing:2px;}
</style>
</head>
<body>
<div class="app">
  <div class="overlay" id="overlay"><div class="spinner"></div><div class="overlay-text">MEMUAT DATA...</div></div>

  <div class="view on" id="vLogin">
    <div class="login-bg"></div><div class="login-grid"></div>
    <div class="login-box">
      <div class="brand">
        <div class="brand-name"><span class="bc">C</span><span class="bw">imory</span></div>
        <div class="brand-sub">PT. Macrosentra Niagaboga</div>
        <div class="brand-divider"></div>
        <div class="brand-desc">EPR · EFFECTIVE PRODUCTIVITY</div>
      </div>
      <div class="login-card">
        <div class="login-title">// Masuk ke Sistem</div>
        <div class="field"><div class="field-label">ID Pengguna</div><input class="field-input" id="inUser" type="text" placeholder="contoh: hoa-atb01" autocomplete="off" autocapitalize="none"></div>
        <div class="field"><div class="field-label">Password</div><input class="field-input" id="inPass" type="password" placeholder="••••••••"></div>
        <button class="btn-login" id="btnLogin" onclick="doLogin()">MASUK</button>
        <div class="login-error" id="loginErr"></div>
      </div>
      <div class="login-footer"><b>EPR Salesman v1.3</b><br>IT Dept. Arvan · PT. Macrosentra Niagaboga · 2026</div>
    </div>
  </div>

  <div class="view" id="vDash">
    <div class="toast" id="toast"></div>
    <div class="topbar">
      <div class="topbar-brand"><div class="topbar-title"><span class="tc">C</span><span class="tw">imory</span></div></div>
      <div class="topbar-right">
        <div class="user-info"><div class="user-name" id="uName">—</div><div class="user-branch" id="uBranch">—</div></div>
        <button class="btn-logout" onclick="doLogout()">KELUAR</button>
      </div>
    </div>
    <div class="modebar">
      <div class="mode-toggle">
        <button class="mode-btn active-today" id="btnToday" onclick="setMode('today')">TODAY</button>
        <button class="mode-btn" id="btnMtd" onclick="setMode('mtd')">MTD</button>
      </div>
      <span class="mode-date" id="dDate">—</span>
    </div>
    <div class="mtd-filter" id="mtdFilter">
      <span class="mtd-label">PERIODE:</span>
      <select class="mtd-select" id="mtdPeriode" onchange="loadData()"></select>
    </div>
    <div class="pull-hint" id="pullHint">↓ Tarik ke bawah untuk refresh</div>
    <div class="sumbar" id="sumbar"></div>
    <div class="list" id="listEl"></div>
  </div>

  <div class="view" id="vDetail">
    <div class="detail-back" onclick="showView('vDash')">
      <span class="back-arrow">‹</span>
      <div><div class="back-label">Kembali ke daftar</div><div class="back-id" id="dId">—</div><div class="back-name" id="dName">—</div></div>
    </div>
    <div class="detail-body" id="dBody"></div>
  </div>
</div>

<script>
const API=(typeof CONFIG!=='undefined'&&CONFIG.API)?CONFIG.API:'http://172.20.240.7:1888';
let token=localStorage.getItem('epr_token')||'';
let userData=JSON.parse(localStorage.getItem('epr_user')||'null');
let salesData=[],mtdData=[],currentMode='today';
const $=id=>document.getElementById(id);
const f=n=>(!n||n==0)?'0':Number(n).toLocaleString('id-ID');
const cv=v=>(!v||v==0)?'c-dim':'c-green';
const parseOmset=s=>{if(!s||s==='0')return 0;return parseInt(String(s).replace(/\./g,''))||0;};
const ecColor=pct=>parseFloat(pct)>=70?'c-green':parseFloat(pct)>=50?'c-yellow':'c-red';
const ecBarColor=pct=>parseFloat(pct)>=70?'var(--green)':parseFloat(pct)>=50?'var(--yellow)':'var(--red)';
const pctNum=s=>parseFloat((s||'0').replace(',','.').replace('%',''))||0;

function showView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));$(id).classList.add('on');}
function loading(show){$('overlay').classList.toggle('on',show);}
function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

function buildPeriodeOptions(){
  const now=new Date(),year=now.getFullYear(),month=now.getMonth()+1;
  const bulan=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  const sel=$('mtdPeriode');sel.innerHTML='';
  for(let m=1;m<=month;m++){
    const val=`${year}${String(m).padStart(2,'0')}`;
    const opt=document.createElement('option');
    opt.value=val;opt.textContent=`${bulan[m-1]} ${year}`;
    if(m===month)opt.selected=true;
    sel.appendChild(opt);
  }
}

function setMode(mode){
  currentMode=mode;
  $('btnToday').className='mode-btn'+(mode==='today'?' active-today':'');
  $('btnMtd').className='mode-btn'+(mode==='mtd'?' active-mtd':'');
  $('mtdFilter').classList.toggle('on',mode==='mtd');
  $('pullHint').classList.toggle('on',true);
  const now=new Date();
  $('dDate').textContent=mode==='today'
    ?now.toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'})
    :'S/D '+now.toLocaleDateString('id-ID',{month:'long',year:'numeric'});
  loadData();
}

let touchStartY=0,isPulling=false;
document.addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const diff=e.changedTouches[0].clientY-touchStartY;
  if(diff>80&&window.scrollY===0&&!isPulling){isPulling=true;loadData().finally(()=>{isPulling=false;});}
},{passive:true});

async function doLogin(){
  const userid=$('inUser').value.trim().toLowerCase(),password=$('inPass').value.trim();
  const errEl=$('loginErr'),btn=$('btnLogin');
  errEl.style.display='none';
  if(!userid||!password){errEl.textContent='ID dan password wajib diisi.';errEl.style.display='block';return;}
  btn.disabled=true;btn.textContent='MEMPROSES...';loading(true);
  try{
    const res=await fetch(`${API}/api/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userid,password})});
    const data=await res.json();
    if(!data.success){errEl.textContent=data.message||'ID atau password salah.';errEl.style.display='block';return;}
    token=data.token;
    userData={userid:data.userid,slsno:data.slsno,kodecabang:data.kodecabang};
    localStorage.setItem('epr_token',token);localStorage.setItem('epr_user',JSON.stringify(userData));
    $('uName').textContent=data.userid.toUpperCase();$('uBranch').textContent=data.kodecabang;
    showView('vDash');setMode('today');
  }catch(err){errEl.textContent='Gagal terhubung ke server. Cek koneksi jaringan.';errEl.style.display='block';}
  finally{btn.disabled=false;btn.textContent='MASUK';loading(false);}
}

async function doLogout(){
  try{await fetch(`${API}/api/logout`,{method:'POST',headers:{'Authorization':`Bearer ${token}`}});}catch(e){}
  token='';userData=null;salesData=[];mtdData=[];
  localStorage.removeItem('epr_token');localStorage.removeItem('epr_user');
  $('inUser').value='';$('inPass').value='';showView('vLogin');
}

async function loadData(){
  loading(true);
  try{
    if(currentMode==='today'){
      const res=await fetch(`${API}/api/data`,{headers:{'Authorization':`Bearer ${token}`}});
      const json=await res.json();
      if(!json.success){if(res.status===401){doLogout();return;}return;}
      salesData=json.data||[];$('dDate').textContent=json.date||'';
    }else{
      const periode=$('mtdPeriode').value;
      const res=await fetch(`${API}/api/mtd?periode=${periode}`,{headers:{'Authorization':`Bearer ${token}`}});
      const json=await res.json();
      if(!json.success){if(res.status===401){doLogout();return;}return;}
      mtdData=json.data||[];
      const bulan=['','Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
      const m=parseInt(periode.substring(4)),y=periode.substring(0,4);
      $('dDate').textContent=`${bulan[m]} ${y}`;
    }
    renderDash();showToast('✓ Data berhasil dimuat');
  }catch(err){console.error(err);}finally{loading(false);}
}

function renderDash(){currentMode==='today'?renderToday():renderMtd();}

function renderToday(){
  const data=salesData;
  const hadir=data.filter(r=>r.STATUS_ABSEN==='ABSEN').length;
  const totalCall=data.reduce((a,r)=>a+(r.ACTUAL_CALL||0),0);
  const totalEc=data.reduce((a,r)=>a+(r.EC||0),0);
  const totalRps=data.reduce((a,r)=>a+(r.RPS||0),0);
  const ecPct=totalRps>0?(totalEc/totalRps*100).toFixed(1):'0.0';
  const totalOmset=data.reduce((a,r)=>a+parseOmset(r.OMSET_TOTAL),0);
  const omsetFmt=totalOmset===0?'0':(totalOmset/1e6).toFixed(1)+'jt';
  $('sumbar').innerHTML=`<div class="sumbar-row">
    <div class="sum-item"><div class="sum-val c-blue">${hadir}/${data.length}</div><div class="sum-lbl">HADIR</div></div>
    <div class="sum-item"><div class="sum-val c-green">${f(totalCall)}</div><div class="sum-lbl">CALL</div></div>
    <div class="sum-item"><div class="sum-val c-green">${f(totalEc)}</div><div class="sum-lbl">EC</div></div>
    <div class="sum-item"><div class="sum-val c-yellow">${ecPct}%</div><div class="sum-lbl">EC%</div></div>
    <div class="sum-item"><div class="sum-val c-green">${omsetFmt}</div><div class="sum-lbl">OMSET</div></div>
  </div>`;
  let html='';
  data.forEach((r,i)=>{
    const sudahAbsen=r.STATUS_ABSEN==='ABSEN';
    const belumAbsen=!sudahAbsen;
    const ecPctRow=r.RPS>0?(r.EC/r.RPS*100).toFixed(1):'0.0';
    const omset=r.OMSET_TOTAL||'0';
    const cardClass=sudahAbsen?'hadir':'belum';
    const badgeClass=sudahAbsen?'badge-hadir':'badge-belum';
    const badgeText=sudahAbsen?'HADIR':'BELUM ABSEN';
    html+=`<div class="card ${cardClass}" onclick="showDetail(${i})">
      <div class="card-top">
        <div><div class="card-id">${r.SLSCODE}</div><div class="card-name">${r.SLSNAME}</div><div class="card-team">${r.SALESMAN_TEAM} · ${r.BRANCH}</div></div>
        <span class="badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="card-stats">
        <div class="stat-box"><div class="stat-val ${cv(r.RPS)}">${f(r.RPS)}</div><div class="stat-lbl">RPS</div></div>
        <div class="stat-box"><div class="stat-val ${cv(r.ACTUAL_CALL)}">${f(r.ACTUAL_CALL)}</div><div class="stat-lbl">CALL</div></div>
        <div class="stat-box"><div class="stat-val ${cv(r.EC)}">${f(r.EC)}</div><div class="stat-lbl">EC</div></div>
        <div class="stat-box"><div class="stat-val ${ecColor(ecPctRow)}">${absen?'0%':ecPctRow+'%'}</div><div class="stat-lbl">EC%</div></div>
      </div>
      <div class="card-omset">
        <div><div class="omset-label">Omset Total</div><div class="omset-val ${omset==='0'?'zero':''}">${omset==='0'?'—':'Rp '+omset}</div></div>
        <span class="card-detail-btn">detail ›</span>
      </div>
    </div>`;
  });
  const stCall=data.reduce((a,r)=>a+(r.ACTUAL_CALL||0),0);
  const stEc=data.reduce((a,r)=>a+(r.EC||0),0);
  const stRps=data.reduce((a,r)=>a+(r.RPS||0),0);
  const stEcPct=stRps>0?(stEc/stRps*100).toFixed(1):'0.0';
  const stOmset=data.reduce((a,r)=>a+parseOmset(r.OMSET_TOTAL),0);
  const stOmsetFmt=stOmset===0?'0':(stOmset/1e6).toFixed(1)+'jt';
  html+=`<div class="subtotal"><div class="subtotal-title">▸ Sub Total ${userData?userData.kodecabang:''}</div><div class="subtotal-grid">
    <div class="subtotal-item"><div class="subtotal-val">${f(stCall)}</div><div class="subtotal-lbl">CALL</div></div>
    <div class="subtotal-item"><div class="subtotal-val">${f(stEc)}</div><div class="subtotal-lbl">EC</div></div>
    <div class="subtotal-item"><div class="subtotal-val">${stEcPct}%</div><div class="subtotal-lbl">EC%</div></div>
    <div class="subtotal-item"><div class="subtotal-val">${stOmsetFmt}</div><div class="subtotal-lbl">OMSET</div></div>
  </div></div>`;
  $('listEl').innerHTML=html;
}

function renderMtd(){
  const data=mtdData;
  const totalCall=data.reduce((a,r)=>a+(r.ACTUAL_CALL||0),0);
  const totalEc=data.reduce((a,r)=>a+(r.EC||0),0);
  const totalNoo=data.reduce((a,r)=>a+(r.NOO||0),0);
  const totalRps=data.reduce((a,r)=>a+(r.RPS||0),0);
  const totalOt=data.reduce((a,r)=>a+(r.OT||0),0);
  const totalRo=data.reduce((a,r)=>a+(r.RO||0),0);
  const avgEcPct=totalRps>0?(totalEc/totalRps*100).toFixed(1):'0.0';
  const avgOtPct=totalRo>0?(totalOt/totalRo*100).toFixed(1):'0.0';
  const totalDry=data.reduce((a,r)=>a+parseOmset(r.MONTHLY_OMZ_DRY),0);
  const totalChill=data.reduce((a,r)=>a+parseOmset(r.MONTHLY_OMZ_CHILL),0);
  const totalOmset=data.reduce((a,r)=>a+parseOmset(r.OMSET_TOTAL),0);
  const dryFmt=totalDry===0?'0':(totalDry/1e6).toFixed(1)+'jt';
  const chillFmt=totalChill===0?'0':(totalChill/1e6).toFixed(1)+'jt';
  const omsetFmt=totalOmset===0?'0':(totalOmset/1e6).toFixed(1)+'jt';

  $('sumbar').innerHTML=`
    <div class="sumbar-row">
      <div class="sum-item"><div class="sum-val c-blue">${data.length}</div><div class="sum-lbl">SLS</div></div>
      <div class="sum-item"><div class="sum-val c-green">${f(totalCall)}</div><div class="sum-lbl">CALL</div></div>
      <div class="sum-item"><div class="sum-val c-green">${f(totalEc)}</div><div class="sum-lbl">EC</div></div>
      <div class="sum-item"><div class="sum-val c-yellow">${avgEcPct}%</div><div class="sum-lbl">EC%</div></div>
      <div class="sum-item"><div class="sum-val c-green">${f(totalNoo)}</div><div class="sum-lbl">NOO</div></div>
    </div>
    <div class="sum-divider"></div>
    <div class="sumbar-row">
      <div class="sum-item"><div class="sum-val c-green">${f(totalOt)}</div><div class="sum-lbl">OT</div></div>
      <div class="sum-item"><div class="sum-val c-yellow">${avgOtPct}%</div><div class="sum-lbl">OT%</div></div>
      <div class="sum-item"><div class="sum-val c-green">${dryFmt}</div><div class="sum-lbl">DRY</div></div>
      <div class="sum-item"><div class="sum-val c-green">${chillFmt}</div><div class="sum-lbl">CHILL</div></div>
      <div class="sum-item"><div class="sum-val c-green">${omsetFmt}</div><div class="sum-lbl">NET SALES</div></div>
    </div>`;

  const sorted=[...data].sort((a,b)=>parseOmset(b.OMSET_TOTAL)-parseOmset(a.OMSET_TOTAL));
  const rankMap={};sorted.forEach((r,i)=>{rankMap[r.SLSCODE]=i+1;});

  let html='';
  data.forEach((r,i)=>{
    const absen=!r.ACTUAL_CALL||r.ACTUAL_CALL==0;
    const ecPct=r.EC_PERCENT||'0,00%',otPct=r.OT_PERCENT||'0,00%';
    const ep=pctNum(ecPct),op=pctNum(otPct);
    const omset=r.OMSET_TOTAL||'0';
    const rank=rankMap[r.SLSCODE]||'-';
    const rankClass=rank===1?'gold':rank===2?'silver':rank===3?'bronze':'';
    html+=`<div class="card ${absen?'absen':'hadir'}" onclick="showDetailMtd(${i})">
      <div class="card-rank ${rankClass}">#${rank}</div>
      <div class="card-top">
        <div><div class="card-id">${r.SLSCODE}</div><div class="card-name">${r.SLSNAME||r.SLSCODE}</div><div class="card-team">${r.BRANCH} · ${r.TAHUN||''}</div></div>
        <span class="badge ${absen?'badge-absen':'badge-hadir'}">${absen?'ABSEN':'AKTIF'}</span>
      </div>
      <div class="card-stats">
        <div class="stat-box"><div class="stat-val ${cv(r.RO)}">${f(r.RO)}</div><div class="stat-lbl">RO</div></div>
        <div class="stat-box"><div class="stat-val ${cv(r.RPS)}">${f(r.RPS)}</div><div class="stat-lbl">RPS</div></div>
        <div class="stat-box"><div class="stat-val ${cv(r.ACTUAL_CALL)}">${f(r.ACTUAL_CALL)}</div><div class="stat-lbl">CALL</div></div>
        <div class="stat-box"><div class="stat-val ${cv(r.EC)}">${f(r.EC)}</div><div class="stat-lbl">EC</div></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-row"><span class="progress-lbl">EC%</span><span class="progress-pct ${ecColor(ep)}">${ecPct}</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(ep,100)}%;background:${ecBarColor(ep)}"></div></div>
        <div class="progress-row"><span class="progress-lbl">OT%</span><span class="progress-pct ${ecColor(op)}">${otPct}</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(op,100)}%;background:${ecBarColor(op)}"></div></div>
      </div>
      <div class="card-bottom">
        <div class="bottom-box"><div class="bottom-val ${cv(r.OT)}">${f(r.OT)}</div><div class="bottom-lbl">OT</div></div>
        <div class="bottom-box"><div class="bottom-val ${cv(r.NOO)}">${f(r.NOO)}</div><div class="bottom-lbl">NOO</div></div>
        <div class="bottom-box"><div class="bottom-val ${r.ABSENSI>0?'c-red':'c-dim'}">${f(r.ABSENSI)}</div><div class="bottom-lbl">ABSENSI</div></div>
      </div>
      <div class="card-omset">
        <div><div class="omset-label">Net Sales MTD</div><div class="omset-val ${omset==='0'?'zero':''}">${omset==='0'?'—':'Rp '+omset}</div></div>
        <span class="card-detail-btn">detail ›</span>
      </div>
    </div>`;
  });

  if(data.length>0){
    const bestSales=data.reduce((best,r)=>parseOmset(r.OMSET_TOTAL)>parseOmset(best.OMSET_TOTAL)?r:best,data[0]);
    const bestOt=data.reduce((best,r)=>pctNum(r.OT_PERCENT)>pctNum(best.OT_PERCENT)?r:best,data[0]);
    html+=`<div class="best-box"><div class="best-title">▸ Salesman Terbaik</div><div class="best-grid">
      <div class="best-item">
        <div class="best-cat">Net Sales Tertinggi</div>
        <div class="best-name">${bestSales.SLSNAME||bestSales.SLSCODE||'—'}</div>
        <div class="best-val">Rp ${bestSales.OMSET_TOTAL||'0'}</div>
        <div class="best-sub">${bestSales.SLSCODE||''} · ${bestSales.BRANCH||''}</div>
      </div>
      <div class="best-item">
        <div class="best-cat">OT% Tertinggi</div>
        <div class="best-name">${bestOt.SLSNAME||bestOt.SLSCODE||'—'}</div>
        <div class="best-val">${bestOt.OT_PERCENT||'0,00%'}</div>
        <div class="best-sub">${bestOt.SLSCODE||''} · ${bestOt.BRANCH||''}</div>
      </div>
    </div></div>`;
  }
  $('listEl').innerHTML=html;
}
