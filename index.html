<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPR Salesman · HOA</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1528">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="config.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@600;700;800&display=swap');

:root {
  --bg:      #0d1528;
  --bg2:     #152040;
  --bg3:     #1a2a50;
  --border:  #243660;
  --border2: #2e4070;
  --blue:    #3b82f6;
  --blue2:   #1d4ed8;
  --cyan:    #22d3ee;
  --green:   #4ade80;
  --yellow:  #fbbf24;
  --red:     #f87171;
  --text:    #ffffff;
  --text2:   #cbd5e1;
  --text3:   #7a90b8;
  --mono:    'JetBrains Mono', monospace;
  --display: 'Syne', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  font-family: var(--mono);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  overflow-x: hidden;
}

.app { width: 100%; max-width: 430px; min-height: 100vh; background: var(--bg); }

.view { display: none; flex-direction: column; min-height: 100vh; }
.view.on { display: flex; }

/* ══ LOGIN ══ */
#vLogin {
  justify-content: center;
  align-items: center;
  padding: 32px 24px;
  position: relative;
}

.login-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 20%, rgba(59,130,246,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 80% 80%, rgba(34,211,238,0.12) 0%, transparent 60%);
  pointer-events: none;
}

.login-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(59,130,246,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.07) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
}

.login-box { width: 100%; max-width: 360px; position: relative; z-index: 1; }

.brand { text-align: center; margin-bottom: 36px; }

.brand-logo {
  display: inline-flex;
  align-items: center;
  margin-bottom: 8px;
}

.brand-icon {
  width: 46px; height: 46px;
  border-radius: 13px;
  background: linear-gradient(135deg, var(--blue2), var(--blue));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--display);
  font-size: 24px; font-weight: 800; color: #fff;
  box-shadow: 0 0 28px rgba(59,130,246,0.45);
  margin-right: 4px;
  flex-shrink: 0;
}

.brand-name {
  font-family: var(--display);
  font-size: 30px; font-weight: 800;
  color: var(--text);
  letter-spacing: -1px;
  line-height: 1;
}

.brand-name span { color: var(--cyan); }

.brand-sub {
  font-size: 10px; color: var(--text3);
  letter-spacing: 3px; text-transform: uppercase; margin-top: 8px;
}

.brand-divider {
  width: 48px; height: 2px;
  background: linear-gradient(90deg, var(--blue), var(--cyan));
  margin: 14px auto; border-radius: 2px;
}

.brand-desc { font-size: 11px; color: var(--text2); letter-spacing: 1px; font-weight: 600; }

.login-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px;
}

.login-title { font-size: 11px; color: var(--cyan); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; font-weight: 700; }

.field { margin-bottom: 16px; }

.field-label { font-size: 10px; color: var(--text2); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; font-weight: 600; }

.field-input {
  width: 100%; background: var(--bg3);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 14px; font-family: var(--mono);
  font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s;
}

.field-input:focus { border-color: var(--blue); }
.field-input::placeholder { color: var(--text3); }

.btn-login {
  width: 100%;
  background: linear-gradient(135deg, var(--blue2), var(--blue));
  border: none; border-radius: 8px; padding: 14px;
  font-family: var(--mono); font-size: 12px; font-weight: 700;
  color: #fff; letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; margin-top: 8px; transition: all 0.2s;
  box-shadow: 0 4px 18px rgba(59,130,246,0.35);
}

.btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.login-error {
  color: var(--red); font-size: 11px; text-align: center;
  margin-top: 10px; display: none;
  background: rgba(248,113,113,0.1);
  border: 1px solid rgba(248,113,113,0.3);
  border-radius: 6px; padding: 8px;
}

.login-footer {
  text-align: center; margin-top: 24px;
  font-size: 9px; color: var(--text3); line-height: 1.8; letter-spacing: 1px;
}
.login-footer b { color: var(--cyan); font-weight: 400; }

/* ══ TOPBAR ══ */
.topbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 12px 16px; display: flex; align-items: center;
  justify-content: space-between; position: sticky; top: 0; z-index: 10;
}

.topbar-brand { display: flex; align-items: center; gap: 8px; }

.topbar-icon {
  width: 30px; height: 30px; border-radius: 8px;
  background: linear-gradient(135deg, var(--blue2), var(--blue));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--display); font-size: 15px; font-weight: 800; color: #fff;
}

.topbar-title { font-family: var(--display); font-size: 17px; font-weight: 800; color: var(--text); }
.topbar-title span { color: var(--cyan); }

.topbar-right { display: flex; align-items: center; gap: 8px; }
.user-info { text-align: right; }
.user-name { font-size: 11px; color: var(--text); font-weight: 700; }
.user-branch { font-size: 9px; color: var(--yellow); letter-spacing: 1px; font-weight: 700; }

.btn-logout {
  background: transparent; border: 1px solid var(--border2);
  border-radius: 6px; padding: 5px 10px; font-family: var(--mono);
  font-size: 9px; font-weight: 700; color: var(--text2);
  letter-spacing: 1px; cursor: pointer; text-transform: uppercase; transition: all 0.2s;
}
.btn-logout:hover { border-color: var(--red); color: var(--red); }

/* ══ MODE BAR ══ */
.modebar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 8px 12px; display: flex; align-items: center;
  justify-content: space-between; gap: 8px;
}

.mode-toggle {
  display: flex; background: var(--bg3);
  border-radius: 8px; padding: 3px; gap: 2px;
}

.mode-btn {
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  padding: 6px 16px; border-radius: 6px; border: none;
  cursor: pointer; letter-spacing: 1px; transition: all 0.2s;
  color: var(--text3); background: transparent;
}

.mode-btn.active-today { background: var(--blue); color: #fff; box-shadow: 0 2px 10px rgba(59,130,246,0.4); }
.mode-btn.active-mtd { background: var(--yellow); color: #0d1528; box-shadow: 0 2px 10px rgba(251,191,36,0.4); }

.mode-date { font-size: 9px; color: var(--text3); letter-spacing: 1px; }

/* ══ MTD FILTER ══ */
.mtd-filter {
  display: none; padding: 6px 12px;
  background: var(--bg3); border-bottom: 1px solid var(--border);
  align-items: center; gap: 8px;
}
.mtd-filter.on { display: flex; }
.mtd-label { font-size: 9px; color: var(--text3); letter-spacing: 1px; font-weight: 600; }
.mtd-select {
  font-family: var(--mono); font-size: 10px;
  background: var(--bg2); border: 1px solid var(--border2);
  color: var(--text); padding: 5px 8px; border-radius: 5px; outline: none;
}

/* ══ SUMBAR ══ */
.sumbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 8px 10px; display: grid;
  grid-template-columns: repeat(5, 1fr); gap: 4px;
}
.sum-item { text-align: center; }
.sum-val { font-size: 12px; font-weight: 700; }
.sum-lbl { font-size: 7px; color: var(--text3); margin-top: 2px; letter-spacing: 1px; font-weight: 600; }

/* ══ LIST ══ */
.list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
.list::-webkit-scrollbar { width: 3px; }
.list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ══ CARD ══ */
.card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 12px; cursor: pointer;
  transition: all 0.15s; position: relative; overflow: hidden;
}
.card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
.card.hadir::before { background: var(--green); }
.card.absen::before { background: var(--red); }
.card:hover { border-color: var(--border2); background: var(--bg3); }

.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.card-id { font-size: 8px; color: var(--cyan); margin-bottom: 2px; letter-spacing: 1px; font-weight: 700; }
.card-name { font-size: 13px; font-weight: 700; color: var(--text); }
.card-team { font-size: 9px; color: var(--text2); margin-top: 2px; }

.badge { font-size: 8px; font-weight: 700; padding: 3px 8px; border-radius: 4px; letter-spacing: 1px; flex-shrink: 0; }
.badge-hadir { background: rgba(74,222,128,0.15); color: #86efac; border: 1px solid rgba(74,222,128,0.3); }
.badge-absen { background: rgba(248,113,113,0.15); color: #fca5a5; border: 1px solid rgba(248,113,113,0.3); }

.card-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 8px; }
.stat-box { background: var(--bg3); border-radius: 6px; padding: 6px 4px; text-align: center; border: 1px solid var(--border); }
.stat-val { font-size: 13px; font-weight: 700; }
.stat-lbl { font-size: 7px; color: var(--text3); margin-top: 2px; letter-spacing: 1px; font-weight: 600; }

.card-omset { display: flex; justify-content: space-between; align-items: center; padding-top: 7px; border-top: 1px solid var(--border); }
.omset-label { font-size: 9px; color: var(--text3); }
.omset-val { font-size: 13px; font-weight: 700; color: var(--text); }
.omset-val.zero { color: var(--text3); }
.card-detail-btn { font-size: 9px; color: var(--cyan); font-weight: 700; }

/* ══ SUBTOTAL ══ */
.subtotal { background: var(--bg3); border: 1px solid var(--border2); border-radius: 10px; padding: 10px 12px; margin-top: 4px; }
.subtotal-title { font-size: 9px; color: var(--yellow); letter-spacing: 2px; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; }
.subtotal-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
.subtotal-item { text-align: center; }
.subtotal-val { font-size: 13px; font-weight: 700; color: var(--yellow); }
.subtotal-lbl { font-size: 7px; color: var(--text3); margin-top: 2px; letter-spacing: 1px; }

/* ══ COLORS ══ */
.c-green { color: var(--green); }
.c-yellow { color: var(--yellow); }
.c-red { color: var(--red); }
.c-blue { color: var(--cyan); }
.c-dim { color: var(--text3); }

/* ══ DETAIL ══ */
#vDetail { background: var(--bg); }

.detail-back {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 12px 16px; display: flex; align-items: center; gap: 10px;
  cursor: pointer; position: sticky; top: 0; z-index: 10;
}
.back-arrow { font-size: 20px; color: var(--cyan); font-weight: 700; }
.back-label { font-size: 9px; color: var(--text3); }
.back-name { font-size: 13px; font-weight: 700; color: var(--text); }
.back-id { font-size: 9px; color: var(--cyan); font-weight: 700; }

.detail-body { padding: 12px; overflow-y: auto; flex: 1; }
.detail-section { margin-bottom: 14px; }
.detail-section-title {
  font-size: 9px; color: var(--cyan); letter-spacing: 2px;
  text-transform: uppercase; font-weight: 700; margin-bottom: 8px;
  padding-bottom: 5px; border-bottom: 1px solid var(--border);
}
.detail-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid rgba(36,54,96,0.5); }
.detail-key { font-size: 11px; color: var(--text2); }
.detail-val { font-size: 12px; font-weight: 700; color: var(--text); }

.detail-mode-badge {
  display: inline-block; font-size: 8px; font-weight: 700;
  padding: 2px 7px; border-radius: 3px; letter-spacing: 1px; margin-left: 6px;
  background: rgba(251,191,36,0.15); color: var(--yellow);
  border: 1px solid rgba(251,191,36,0.3); vertical-align: middle;
}

/* ══ OVERLAY ══ */
.overlay {
  position: fixed; inset: 0; background: rgba(13,21,40,0.9);
  display: none; align-items: center; justify-content: center;
  z-index: 100; flex-direction: column; gap: 14px;
}
.overlay.on { display: flex; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.overlay-text { font-size: 10px; color: var(--text2); letter-spacing: 3px; font-weight: 600; }
</style>
</head>
<body>
<div class="app">

  <div class="overlay" id="overlay">
    <div class="spinner"></div>
    <div class="overlay-text">MEMUAT DATA...</div>
  </div>

  <!-- ══ LOGIN ══ -->
  <div class="view on" id="vLogin">
    <div class="login-bg"></div>
    <div class="login-grid"></div>
    <div class="login-box">
      <div class="brand">
        <div class="brand-logo">
          <div class="brand-icon">C</div>
          <div class="brand-name">imory<span>.</span></div>
        </div>
        <div class="brand-sub">PT. Macrosentra Niagaboga</div>
        <div class="brand-divider"></div>
        <div class="brand-desc">EPR · EFFECTIVE PRODUCTIVITY</div>
      </div>
      <div class="login-card">
        <div class="login-title">// Masuk ke Sistem</div>
        <div class="field">
          <div class="field-label">ID Pengguna</div>
          <input class="field-input" id="inUser" type="text" placeholder="contoh: hoa-atb01" autocomplete="off" autocapitalize="none">
        </div>
        <div class="field">
          <div class="field-label">Password</div>
          <input class="field-input" id="inPass" type="password" placeholder="••••••••">
        </div>
        <button class="btn-login" id="btnLogin" onclick="doLogin()">MASUK</button>
        <div class="login-error" id="loginErr"></div>
      </div>
      <div class="login-footer">
        <b>EPR Salesman v1.1</b><br>
        IT Dept. Arvan · PT. Macrosentra Niagaboga · 2026
      </div>
    </div>
  </div>

  <!-- ══ DASHBOARD ══ -->
  <div class="view" id="vDash">
    <div class="topbar">
      <div class="topbar-brand">
        <div class="topbar-icon">C</div>
        <div class="topbar-title">imory<span>.</span></div>
      </div>
      <div class="topbar-right">
        <div class="user-info">
          <div class="user-name" id="uName">—</div>
          <div class="user-branch" id="uBranch">—</div>
        </div>
        <button class="btn-logout" onclick="doLogout()">KELUAR</button>
      </div>
    </div>

    <div class="modebar">
      <div class="mode-toggle">
        <button class="mode-btn active-today" id="btnToday" onclick="setMode('today')">TODAY</button>
        <button class="mode-btn" id="btnMtd" onclick="setMode('mtd')">MTD</button>
      </div>
      <span class="mode-date" id="dDate">—</span>
    </div>

    <div class="mtd-filter" id="mtdFilter">
      <span class="mtd-label">PERIODE:</span>
      <select class="mtd-select" id="mtdPeriode" onchange="loadData()">
        <option value="202601">Jan 2026</option>
        <option value="202602">Feb 2026</option>
        <option value="202603">Mar 2026</option>
        <option value="202604">Apr 2026</option>
        <option value="202605">Mei 2026</option>
        <option value="202606">Jun 2026</option>
        <option value="202607">Jul 2026</option>
        <option value="202608">Agu 2026</option>
        <option value="202609">Sep 2026</option>
        <option value="202610">Okt 2026</option>
        <option value="202611">Nov 2026</option>
        <option value="202612">Des 2026</option>
      </select>
    </div>

    <div class="sumbar" id="sumbar"></div>
    <div class="list" id="listEl"></div>
  </div>

  <!-- ══ DETAIL ══ -->
  <div class="view" id="vDetail">
    <div class="detail-back" onclick="showView('vDash')">
      <span class="back-arrow">‹</span>
      <div>
        <div class="back-label">Kembali ke daftar</div>
        <div class="back-id" id="dId">—</div>
        <div class="back-name" id="dName">—</div>
      </div>
    </div>
    <div class="detail-body" id="dBody"></div>
  </div>

</div>
<script>
const API = (typeof CONFIG !== 'undefined' && CONFIG.API) ? CONFIG.API : 'https://172.20.240.7:1888';

let token = localStorage.getItem('epr_token') || '';
let userData = JSON.parse(localStorage.getItem('epr_user') || 'null');
let salesData = [];
let mtdData = [];
let currentMode = 'today';

const $ = id => document.getElementById(id);
const f = n => (!n || n == 0) ? '0' : Number(n).toLocaleString('id-ID');
const cv = v => (!v || v == 0) ? 'c-dim' : 'c-green';
const parseOmset = s => { if (!s || s === '0') return 0; return parseInt(String(s).replace(/\./g, '')) || 0; };

function showView(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('on')); $(id).classList.add('on'); }
function loading(show) { $('overlay').classList.toggle('on', show); }

function setMode(mode) {
  currentMode = mode;
  $('btnToday').className = 'mode-btn' + (mode === 'today' ? ' active-today' : '');
  $('btnMtd').className = 'mode-btn' + (mode === 'mtd' ? ' active-mtd' : '');
  $('mtdFilter').classList.toggle('on', mode === 'mtd');
  const now = new Date();
  if (mode === 'today') {
    $('dDate').textContent = now.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
  } else {
    $('dDate').textContent = 'S/D ' + now.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
  }
  loadData();
}

async function doLogin() {
  const userid = $('inUser').value.trim().toLowerCase();
  const password = $('inPass').value.trim();
  const errEl = $('loginErr');
  const btn = $('btnLogin');
  errEl.style.display = 'none';
  if (!userid || !password) { errEl.textContent = 'ID dan password wajib diisi.'; errEl.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'MEMPROSES...'; loading(true);
  try {
    const res = await fetch(`${API}/api/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userid, password }) });
    const data = await res.json();
    if (!data.success) { errEl.textContent = data.message || 'ID atau password salah.'; errEl.style.display = 'block'; return; }
    token = data.token;
    userData = { userid: data.userid, slsno: data.slsno, kodecabang: data.kodecabang };
    localStorage.setItem('epr_token', token);
    localStorage.setItem('epr_user', JSON.stringify(userData));
    $('uName').textContent = data.userid.toUpperCase();
    $('uBranch').textContent = data.kodecabang;
    showView('vDash'); setMode('today');
  } catch (err) {
    errEl.textContent = 'Gagal terhubung ke server. Cek koneksi jaringan.'; errEl.style.display = 'block';
  } finally { btn.disabled = false; btn.textContent = 'MASUK'; loading(false); }
}

async function doLogout() {
  try { await fetch(`${API}/api/logout`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } }); } catch (e) {}
  token = ''; userData = null; salesData = []; mtdData = [];
  localStorage.removeItem('epr_token'); localStorage.removeItem('epr_user');
  $('inUser').value = ''; $('inPass').value = '';
  showView('vLogin');
}

async function loadData() {
  loading(true);
  try {
    const endpoint = currentMode === 'today' ? '/api/data' : `/api/mtd?periode=${$('mtdPeriode').value}`;
    const res = await fetch(`${API}${endpoint}`, { headers: { 'Authorization': `Bearer ${token}` } });
    const json = await res.json();
    if (!json.success) { if (res.status === 401) { doLogout(); return; } return; }
    if (currentMode === 'today') { salesData = json.data || []; } else { mtdData = json.data || []; }
    renderDash();
  } catch (err) { console.error(err); } finally { loading(false); }
}

function renderDash() {
  const data = currentMode === 'today' ? salesData : mtdData;
  const isMtd = currentMode === 'mtd';

  if (isMtd) {
    const totalCall = data.reduce((a, r) => a + (r.ACTUAL_CALL || 0), 0);
    const totalEc = data.reduce((a, r) => a + (r.EC || 0), 0);
    const totalRo = data.reduce((a, r) => a + (r.RO || 0), 0);
    const ecPct = totalRo > 0 ? (totalEc / totalRo * 100).toFixed(1) : '0.0';
    const totalOmset = data.reduce((a, r) => a + parseOmset(r.OMSET_TOTAL), 0);
    const omsetFmt = totalOmset === 0 ? '0' : (totalOmset / 1e6).toFixed(1) + 'jt';

    $('sumbar').innerHTML = `
      <div class="sum-item"><div class="sum-val c-blue">${data.length}</div><div class="sum-lbl">SLS</div></div>
      <div class="sum-item"><div class="sum-val c-green">${f(totalCall)}</div><div class="sum-lbl">CALL</div></div>
      <div class="sum-item"><div class="sum-val c-green">${f(totalEc)}</div><div class="sum-lbl">EC</div></div>
      <div class="sum-item"><div class="sum-val c-yellow">${ecPct}%</div><div class="sum-lbl">EC%</div></div>
      <div class="sum-item"><div class="sum-val c-green">${omsetFmt}</div><div class="sum-lbl">NET SALES</div></div>`;

    let html = '';
    data.forEach((r, i) => {
      const absen = !r.ACTUAL_CALL || r.ACTUAL_CALL == 0;
      const ecPctRow = r.RO > 0 ? (r.EC / r.RO * 100).toFixed(1) : '0.0';
      const ecColor = ecPctRow >= 70 ? 'c-green' : ecPctRow >= 50 ? 'c-yellow' : 'c-red';
      const omset = r.OMSET_TOTAL || '0';
      html += `
      <div class="card ${absen ? 'absen' : 'hadir'}" onclick="showDetailMtd(${i})">
        <div class="card-top">
          <div>
            <div class="card-id">${r.SLSCODE}</div>
            <div class="card-name">${r.SLSNAME || r.SLSCODE}</div>
            <div class="card-team">${r.BRANCH} · ${r.TAHUN || ''}</div>
          </div>
          <span class="badge ${absen ? 'badge-absen' : 'badge-hadir'}">${absen ? 'ABSEN' : 'AKTIF'}</span>
        </div>
        <div class="card-stats">
          <div class="stat-box"><div class="stat-val ${cv(r.RO)}">${f(r.RO)}</div><div class="stat-lbl">RO</div></div>
          <div class="stat-box"><div class="stat-val ${cv(r.ACTUAL_CALL)}">${f(r.ACTUAL_CALL)}</div><div class="stat-lbl">CALL</div></div>
          <div class="stat-box"><div class="stat-val ${cv(r.EC)}">${f(r.EC)}</div><div class="stat-lbl">EC</div></div>
          <div class="stat-box"><div class="stat-val ${ecColor}">${ecPctRow}%</div><div class="stat-lbl">EC%</div></div>
        </div>
        <div class="card-omset">
          <div><div class="omset-label">Net Sales MTD</div><div class="omset-val ${omset === '0' ? 'zero' : ''}">${omset === '0' ? '—' : 'Rp ' + omset}</div></div>
          <span class="card-detail-btn">detail ›</span>
        </div>
      </div>`;
    });

    const stCall = data.reduce((a, r) => a + (r.ACTUAL_CALL || 0), 0);
    const stEc = data.reduce((a, r) => a + (r.EC || 0), 0);
    const stRo = data.reduce((a, r) => a + (r.RO || 0), 0);
    const stEcPct = stRo > 0 ? (stEc / stRo * 100).toFixed(1) : '0.0';
    const stOmset = data.reduce((a, r) => a + parseOmset(r.OMSET_TOTAL), 0);
    const stOmsetFmt = stOmset === 0 ? '0' : (stOmset / 1e6).toFixed(1) + 'jt';
    html += `<div class="subtotal"><div class="subtotal-title">▸ Sub Total MTD ${userData ? userData.kodecabang : ''}</div><div class="subtotal-grid">
      <div class="subtotal-item"><div class="subtotal-val">${f(stCall)}</div><div class="subtotal-lbl">CALL</div></div>
      <div class="subtotal-item"><div class="subtotal-val">${f(stEc)}</div><div class="subtotal-lbl">EC</div></div>
      <div class="subtotal-item"><div class="subtotal-val">${stEcPct}%</div><div class="subtotal-lbl">EC%</div></div>
      <div class="subtotal-item"><div class="subtotal-val">${stOmsetFmt}</div><div class="subtotal-lbl">NET SALES</div></div>
    </div></div>`;
    $('listEl').innerHTML = html;

  } else {
    const hadir = data.filter(r => r.ACTUAL_CALL > 0).length;
    const totalCall = data.reduce((a, r) => a + (r.ACTUAL_CALL || 0), 0);
    const totalEc = data.reduce((a, r) => a + (r.EC || 0), 0);
    const totalRps = data.reduce((a, r) => a + (r.RPS || 0), 0);
    const ecPct = totalRps > 0 ? (totalEc / totalRps * 100).toFixed(1) : '0.0';
    const totalOmset = data.reduce((a, r) => a + parseOmset(r.OMSET_TOTAL), 0);
    const omsetFmt = totalOmset === 0 ? '0' : (totalOmset / 1e6).toFixed(1) + 'jt';

    $('sumbar').innerHTML = `
      <div class="sum-item"><div class="sum-val c-blue">${hadir}/${data.length}</div><div class="sum-lbl">HADIR</div></div>
      <div class="sum-item"><div class="sum-val c-green">${f(totalCall)}</div><div class="sum-lbl">CALL</div></div>
      <div class="sum-item"><div class="sum-val c-green">${f(totalEc)}</div><div class="sum-lbl">EC</div></div>
      <div class="sum-item"><div class="sum-val c-yellow">${ecPct}%</div><div class="sum-lbl">EC%</div></div>
      <div class="sum-item"><div class="sum-val c-green">${omsetFmt}</div><div class="sum-lbl">OMSET</div></div>`;

    let html = '';
    data.forEach((r, i) => {
      const absen = !r.ACTUAL_CALL || r.ACTUAL_CALL == 0;
      const ecPctRow = r.RPS > 0 ? (r.EC / r.RPS * 100).toFixed(1) : '0.0';
      const ecColor = ecPctRow >= 70 ? 'c-green' : ecPctRow >= 50 ? 'c-yellow' : 'c-red';
      const omset = r.OMSET_TOTAL || '0';
      html += `
      <div class="card ${absen ? 'absen' : 'hadir'}" onclick="showDetail(${i})">
        <div class="card-top">
          <div>
            <div class="card-id">${r.SLSCODE}</div>
            <div class="card-name">${r.SLSNAME}</div>
            <div class="card-team">${r.SALESMAN_TEAM} · ${r.BRANCH}</div>
          </div>
          <span class="badge ${absen ? 'badge-absen' : 'badge-hadir'}">${absen ? 'ABSEN' : 'HADIR'}</span>
        </div>
        <div class="card-stats">
          <div class="stat-box"><div class="stat-val ${cv(r.RPS)}">${f(r.RPS)}</div><div class="stat-lbl">RPS</div></div>
          <div class="stat-box"><div class="stat-val ${cv(r.ACTUAL_CALL)}">${f(r.ACTUAL_CALL)}</div><div class="stat-lbl">CALL</div></div>
          <div class="stat-box"><div class="stat-val ${cv(r.EC)}">${f(r.EC)}</div><div class="stat-lbl">EC</div></div>
          <div class="stat-box"><div class="stat-val ${ecColor}">${absen ? '0%' : ecPctRow + '%'}</div><div class="stat-lbl">EC%</div></div>
        </div>
        <div class="card-omset">
          <div><div class="omset-label">Omset Total</div><div class="omset-val ${omset === '0' ? 'zero' : ''}">${omset === '0' ? '—' : 'Rp ' + omset}</div></div>
          <span class="card-detail-btn">detail ›</span>
        </div>
      </div>`;
    });

    const stCall = data.reduce((a, r) => a + (r.ACTUAL_CALL || 0), 0);
    const stEc = data.reduce((a, r) => a + (r.EC || 0), 0);
    const stRps = data.reduce((a, r) => a + (r.RPS || 0), 0);
    const stEcPct = stRps > 0 ? (stEc / stRps * 100).toFixed(1) : '0.0';
    const stOmset = data.reduce((a, r) => a + parseOmset(r.OMSET_TOTAL), 0);
    const stOmsetFmt = stOmset === 0 ? '0' : (stOmset / 1e6).toFixed(1) + 'jt';
    html += `<div class="subtotal"><div class="subtotal-title">▸ Sub Total ${userData ? userData.kodecabang : ''}</div><div class="subtotal-grid">
      <div class="subtotal-item"><div class="subtotal-val">${f(stCall)}</div><div class="subtotal-lbl">CALL</div></div>
      <div class="subtotal-item"><div class="subtotal-val">${f(stEc)}</div><div class="subtotal-lbl">EC</div></div>
      <div class="subtotal-item"><div class="subtotal-val">${stEcPct}%</div><div class="subtotal-lbl">EC%</div></div>
      <div class="subtotal-item"><div class="subtotal-val">${stOmsetFmt}</div><div class="subtotal-lbl">OMSET</div></div>
    </div></div>`;
    $('listEl').innerHTML = html;
  }
}

    <div class="detail-section">

    </div>`;
  showView('vDetail');
}

$('inPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
$('inUser').addEventListener('keydown', e => { if (e.key === 'Enter') $('inPass').focus(); });

// Set periode ke bulan berjalan
const nowMonth = new Date().getMonth() + 1;
const nowYear = new Date().getFullYear();
const periodeNow = `${nowYear}${String(nowMonth).padStart(2,'0')}`;
for (let opt of $('mtdPeriode').options) { if (opt.value === periodeNow) { opt.selected = true; break; } }

if (token && userData) {
  $('uName').textContent = userData.userid.toUpperCase();
  $('uBranch').textContent = userData.kodecabang;
  showView('vDash');
  setMode('today');
}
